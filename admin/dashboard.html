<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Content Manager</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #111827;
            --card: #1e293b;
            --muted: #94a3b8;
            --brand: #6366f1;
            --brand2: #8b5cf6;
            --ok: #10b981;
            --warn: #f59e0b;
            --err: #ef4444;
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg1);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #0b1220;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            padding: 0 25px;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 15px 25px;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: #fff;
            border-left-color: var(--brand);
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary { background: var(--brand); color: #fff; }
        .btn-primary:hover { background: var(--brand2); transform: translateY(-2px); }
        .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: var(--err); color: #fff; }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--muted); font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #111827;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
        }
        input:focus { border-color: var(--brand); outline: none; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.02); color: var(--muted); font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .actions { display: flex; gap: 10px; }

        .hidden { display: none !important; }
        .status-msg { margin-top: 15px; font-size: 14px; }
        .ok { color: var(--ok); }
        .err { color: var(--err); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <div style="width: 35px; height: 35px; background: #fff; color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center;">R</div>
            <span>Admin Panel</span>
        </div>
        
        <div class="nav-item active" data-table="projects" onclick="switchTable('projects')">
            <i class="fa-solid fa-folder-open"></i> Portfolio Projects
        </div>
        <div class="nav-item" data-table="research" onclick="switchTable('research')">
            <i class="fa-solid fa-microscope"></i> Research Papers
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </div>
    </div>

    <div class="main">
        <!-- Configuration Section -->
        <div id="config-section" class="hidden">
            <div class="top-bar">
                <h2>Supabase Configuration Required</h2>
            </div>
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <p style="margin-bottom: 20px; font-size: 14px; color: var(--muted);">
                    It looks like your Supabase credentials haven't been set yet. Please enter them here. 
                </p>
                <div class="form-group">
                    <label>Supabase Project URL</label>
                    <input type="text" id="cfg-url" placeholder="https://yourproject.supabase.co">
                </div>
                <div class="form-group">
                    <label>Supabase Anon Key</label>
                    <input type="text" id="cfg-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
                </div>
                <button class="btn btn-primary" onclick="saveConfig()" style="width: 100%;">Save & Initialize</button>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="login-section" class="hidden">
            <div class="top-bar">
                <h2>Admin Authentication</h2>
            </div>
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="admin@domain.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="login()" style="width: 100%;">Sign In</button>
                <div id="login-msg" class="status-msg"></div>
                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn btn-ghost" onclick="resetConfig()" style="font-size: 11px;">Reset Supabase Config</button>
                </div>
            </div>
        </div>

        <!-- Manager Section -->
        <div id="manager-section" class="hidden">
            <div class="top-bar">
                <h2 id="table-title">Manage Portfolio Projects</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="showForm()">
                        <i class="fa-solid fa-plus"></i> Add New Item
                    </button>
                    <button class="btn btn-ghost" onclick="fetchData()">
                        <i class="fa-solid fa-rotate"></i> Refresh
                    </button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px;">
                <div class="card" style="margin-bottom: 0;">
                    <label>Total Items</label>
                    <div id="stat-total" style="font-size: 24px; font-weight: 700;">-</div>
                </div>
                <div class="card" style="margin-bottom: 0;">
                    <label>Active Category</label>
                    <div id="stat-active" style="font-size: 24px; font-weight: 700; color: var(--brand);">Portfolio</div>
                </div>
            </div>

            <!-- Form Card -->
            <div id="form-card" class="card hidden">
                <h3 id="form-title" style="margin-bottom: 20px;">Add New Project</h3>
                <input type="hidden" id="item-id">
                
                <div id="project-form-fields">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Project Title</label>
                            <input type="text" id="p-title">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="p-category">
                                <option value="web">Web Development</option>
                                <option value="data">Data Analysis</option>
                                <option value="ml">Machine Learning</option>
                                <option value="mobile">Mobile Apps</option>
                                <option value="collab">Collaboration</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="p-desc" rows="3"></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="p-image">
                        </div>
                        <div class="form-group">
                            <label>Tech Stack (Comma Separated)</label>
                            <input type="text" id="p-tech" placeholder="React, Node.js, etc.">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Live Demo URL</label>
                            <input type="text" id="p-demo">
                        </div>
                        <div class="form-group">
                            <label>Repository URL</label>
                            <input type="text" id="p-repo">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Role (For Collaborations)</label>
                        <input type="text" id="p-role">
                    </div>
                </div>

                <div id="research-form-fields" class="hidden">
                    <div class="form-group">
                        <label>Paper Title</label>
                        <input type="text" id="r-title">
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Type / Date (e.g., 2024 • Journal)</label>
                            <input type="text" id="r-date">
                        </div>
                        <div class="form-group">
                            <label>Research Type</label>
                            <select id="r-type">
                                <option value="Journal">Journal Article</option>
                                <option value="Conference">Conference Paper</option>
                                <option value="Ongoing">Ongoing Research</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Journal Name</label>
                        <input type="text" id="r-journal">
                    </div>
                    <div class="form-group">
                        <label>Authors</label>
                        <input type="text" id="r-authors">
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Paper URL</label>
                            <input type="text" id="r-url">
                        </div>
                        <div class="form-group">
                            <label>DOI URL</label>
                            <input type="text" id="r-doi">
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="saveItem()">Save Changes</button>
                    <button class="btn btn-ghost" onclick="hideForm()">Cancel</button>
                </div>
                <div id="form-msg" class="status-msg"></div>
            </div>

            <!-- List Card -->
            <div class="card">
                <table>
                    <thead>
                        <tr id="table-headers"></tr>
                    </thead>
                    <tbody id="table-rows"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config-loader.js"></script>
    <script>
        let sb = null;
        let currentTable = 'projects';
        let currentUser = null;

        async function init() {
            try {
                const loader = new ConfigLoader();
                await loader.loadConfig();
                const config = loader.getConfig();

                if (!config.isValid) {
                    showSection('config-section');
                    return;
                }

                sb = loader.createSupabaseClient();
                const { data } = await sb.auth.getUser();
                
                if (data.user) {
                    currentUser = data.user;
                    showDashboard();
                } else {
                    showSection('login-section');
                }
            } catch (err) {
                console.error("Init fail:", err);
                showSection('config-section');
            }
        }

        function showSection(id) {
            ['config-section', 'login-section', 'manager-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function saveConfig() {
            const url = document.getElementById('cfg-url').value.trim();
            const key = document.getElementById('cfg-key').value.trim();
            if (url && key) {
                localStorage.setItem('sb_url', url);
                localStorage.setItem('sb_key', key);
                window.location.reload();
            }
        }

        function resetConfig() {
            localStorage.removeItem('sb_url');
            localStorage.removeItem('sb_key');
            window.location.reload();
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const msg = document.getElementById('login-msg');
            msg.textContent = "Processing...";
            msg.className = "status-msg";

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                showDashboard();
            } catch (err) {
                msg.textContent = err.message;
                msg.className = "status-msg err";
            }
        }

        function showDashboard() {
            showSection('manager-section');
            fetchData();
        }

        function switchTable(table) {
            currentTable = table;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-table="${table}"]`).classList.add('active');
            document.getElementById('table-title').textContent = table === 'projects' ? 'Manage Portfolio Projects' : 'Manage Research Papers';
            hideForm();
            fetchData();
        }

        async function fetchData() {
            const headers = document.getElementById('table-headers');
            const rows = document.getElementById('table-rows');
            rows.innerHTML = '<tr><td colspan="4" style="text-align: center;">Loading...</td></tr>';

            const { data, error } = await sb.from(currentTable).select('*').order('created_at', { ascending: false });
            if (error) {
                rows.innerHTML = `<tr><td colspan="4" class="err">${error.message}</td></tr>`;
                return;
            }

            document.getElementById('stat-total').textContent = data.length;

            if (currentTable === 'projects') {
                headers.innerHTML = `<th>Title</th><th>Category</th><th>Preview</th><th>Actions</th>`;
                rows.innerHTML = data.map(item => `
                    <tr>
                        <td><strong>${item.title}</strong></td>
                        <td>${item.category}</td>
                        <td><img src="${item.image_url}" style="width: 40px; height: 25px; object-fit: cover; border-radius: 4px;"></td>
                        <td class="actions">
                            <button class="btn btn-ghost" onclick='editItem(${JSON.stringify(item).replace(/'/g, "&#39;")})'><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-ghost" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-trash" style="color:var(--err)"></i></button>
                        </td>
                    </tr>`).join('');
            } else {
                headers.innerHTML = `<th>Paper Title</th><th>Type</th><th>Journal</th><th>Actions</th>`;
                rows.innerHTML = data.map(item => `
                    <tr>
                        <td><strong>${item.title}</strong></td>
                        <td>${item.type}</td>
                        <td>${item.journal}</td>
                        <td class="actions">
                            <button class="btn btn-ghost" onclick='editItem(${JSON.stringify(item).replace(/'/g, "&#39;")})'><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-ghost" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-trash" style="color:var(--err)"></i></button>
                        </td>
                    </tr>`).join('');
            }
        }

        function showForm(item = null) {
            document.getElementById('form-card').classList.remove('hidden');
            document.getElementById('project-form-fields').classList.add('hidden');
            document.getElementById('research-form-fields').classList.add('hidden');
            
            if (currentTable === 'projects') {
                document.getElementById('project-form-fields').classList.remove('hidden');
                document.getElementById('item-id').value = item?.id || '';
                document.getElementById('p-title').value = item?.title || '';
                document.getElementById('p-category').value = item?.category || 'web';
                document.getElementById('p-desc').value = item?.description || '';
                document.getElementById('p-image').value = item?.image_url || '';
                document.getElementById('p-tech').value = item?.tech_stack || '';
                document.getElementById('p-demo').value = item?.demo_url || '';
                document.getElementById('p-repo').value = item?.repo_url || '';
                document.getElementById('p-role').value = item?.role || '';
            } else {
                document.getElementById('research-form-fields').classList.remove('hidden');
                document.getElementById('item-id').value = item?.id || '';
                document.getElementById('r-title').value = item?.title || '';
                document.getElementById('r-date').value = item?.date_string || '';
                document.getElementById('r-type').value = item?.type || 'Journal';
                document.getElementById('r-journal').value = item?.journal || '';
                document.getElementById('r-authors').value = item?.authors || '';
                document.getElementById('r-url').value = item?.full_paper_url || '';
                document.getElementById('r-doi').value = item?.doi_url || '';
            }
        }

        function hideForm() { document.getElementById('form-card').classList.add('hidden'); }

        async function saveItem() {
            const id = document.getElementById('item-id').value;
            const msg = document.getElementById('form-msg');
            msg.textContent = "Saving...";
            
            let payload = currentTable === 'projects' ? {
                title: document.getElementById('p-title').value,
                category: document.getElementById('p-category').value,
                description: document.getElementById('p-desc').value,
                image_url: document.getElementById('p-image').value,
                tech_stack: document.getElementById('p-tech').value,
                demo_url: document.getElementById('p-demo').value,
                repo_url: document.getElementById('p-repo').value,
                role: document.getElementById('p-role').value
            } : {
                title: document.getElementById('r-title').value,
                date_string: document.getElementById('r-date').value,
                type: document.getElementById('r-type').value,
                journal: document.getElementById('r-journal').value,
                authors: document.getElementById('r-authors').value,
                full_paper_url: document.getElementById('r-url').value,
                doi_url: document.getElementById('r-doi').value
            };

            try {
                const { error } = id ? await sb.from(currentTable).update(payload).eq('id', id) : await sb.from(currentTable).insert([payload]);
                if (error) throw error;
                msg.textContent = "Success!";
                setTimeout(() => { hideForm(); fetchData(); }, 1000);
            } catch (err) {
                msg.textContent = err.message;
            }
        }

        async function deleteItem(id) {
            if (confirm('Delete this?')) {
                await sb.from(currentTable).delete().eq('id', id);
                fetchData();
            }
        }

        function logout() { sb.auth.signOut().then(() => window.location.reload()); }

        init();
    </script>
</body>
</html>
