<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Refgiufi</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        nav.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }

        .logo {
            font-size: clamp(16px, 2.5vw, 20px);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
            text-decoration: none;
            color: #1a1a1a;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: clamp(28px, 4vw, 35px);
            height: clamp(28px, 4vw, 35px);
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: clamp(14px, 2.5vw, 18px);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: clamp(20px, 4vw, 45px);
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: clamp(12px, 1.8vw, 14px);
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 2px;
            background: #1a1a1a;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #000;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 80px 20px 60px;
            background: #f8f9fa;
            text-align: center;
        }

        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: clamp(48px, 8vw, 72px);
            font-weight: 300;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(16px, 2.5vw, 20px);
            color: #666;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 80px 0 60px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 1px solid #ddd;
            background: #fff;
            color: #666;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* Portfolio Grid */
        .portfolio-section {
            padding: 0 20px 100px;
        }

        .portfolio-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .project-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .project-image {
            height: 250px;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .project-card:hover .project-image img {
            transform: scale(1.05);
        }

        .project-tags {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 8px;
        }

        .project-tag {
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .project-content {
            padding: 30px;
        }

        .project-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .project-description {
            color: #666;
            line-height: 1.8;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .tech-tag {
            background: #f8f9fa;
            color: #1a1a1a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .project-links {
            display: flex;
            gap: 15px;
        }

        .project-link {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-demo {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-demo:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .btn-code {
            background: transparent;
            color: #1a1a1a;
            border: 1px solid #ddd;
        }

        .btn-code:hover {
            background: #f8f9fa;
            border-color: #1a1a1a;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: #fff;
            padding: 50px 40px;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-links a {
            color: #999;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        .footer-credit {
            margin-top: 5px;
        }

        .footer-contact {
            font-size: 20px;
            font-weight: 400;
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .filter-buttons {
                gap: 10px;
            }

            .filter-btn {
                padding: 8px 15px;
                font-size: 13px;
            }

            .project-content {
                padding: 25px;
            }

            .hero {
                padding: 60px 20px 40px;
            }
            
            .footer-container {
                flex-direction: column;
                gap: 25px;
                text-align: center;
                align-items: center;
            }
            
            .footer-left {
                align-items: center;
                gap: 20px;
            }
            
            .footer-links {
                flex-wrap: wrap;
                gap: 20px;
                justify-content: center;
            }
            
            .footer-credit {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <div class="logo-icon">R</div>
                <span>Refgiufi</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="./">Portfolio</a></li>
                <li><a href="../research/">Research</a></li>
                <li><a href="../contact/">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-container">
            <h1>My Portfolio</h1>
            <p class="hero-subtitle">A collection of projects I've worked on, ranging from web applications to data analysis and machine learning solutions.</p>
        </div>
    </section>

    <!-- Filter Buttons -->
    <div class="portfolio-section">
        <div class="portfolio-container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Projects</button>
                <button class="filter-btn" data-filter="web">Web Development</button>
                <button class="filter-btn" data-filter="data">Data Analysis</button>
                <button class="filter-btn" data-filter="ml">Machine Learning</button>
                <button class="filter-btn" data-filter="mobile">Mobile Apps</button>
                <button class="filter-btn" data-filter="collab">Collaborations</button>
            </div>

            <!-- Portfolio Grid -->
            <div class="portfolio-grid" id="portfolio-container">
                <!-- Data will be loaded from Supabase -->
                <p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Loading projects...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <div class="footer-links">
                    <a href="../index.html#about">About</a>
                    <a href="./">Portfolio</a>
                    <a href="../research/">Research</a>
                    <a href="../contact/">Contact</a>
                    <a href="https://github.com/refgiufi" target="_blank">GitHub</a>
                </div>
                <div class="footer-credit">
                    <span style="color: #666; font-size: 11px;">Built with AI assistance</span>
                </div>
            </div>
            <div class="footer-contact">
                <a href="https://www.linkedin.com/in/refgiufi/" target="_blank" style="color: #fff; text-decoration: none; font-weight: 600;">© 2025 Refgiufi</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/config-loader.js"></script>
    <script>
        let sb = null;
        let allProjects = [];

        async function init() {
            const loader = new ConfigLoader();
            await loader.loadConfig();
            sb = loader.createSupabaseClient();
            await fetchProjects();
        }

        async function fetchProjects() {
            const container = document.getElementById('portfolio-container');
            const { data, error } = await sb.from('projects').select('*').order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red;">Error loading projects: ${error.message}</p>`;
                return;
            }

            allProjects = data;
            renderProjects(data);
        }

        function renderProjects(projects) {
            const container = document.getElementById('portfolio-container');
            if (projects.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">No projects found.</p>';
                return;
            }

            container.innerHTML = projects.map(project => {
                const techTags = (project.tech_stack || '').split(',').map(t => `<span class="tech-tag">${t.trim()}</span>`).join('');
                const collabTag = project.category === 'collab' ? `
                    <div class="project-tags">
                        <span class="project-tag" style="background: #1a1a1a; color: #fff;">Collaboration</span>
                    </div>` : '';
                
                const roleHtml = project.role ? `
                    <p class="project-role" style="font-size: 13px; color: #1a1a1a; margin-bottom: 20px; font-weight: 500;">
                        <span style="color: #666; font-weight: 400;">My Role:</span> ${project.role}
                    </p>` : '';

                return `
                    <div class="project-card" data-category="${project.category}">
                        <div class="project-image">
                            <img src="${project.image_url || 'https://via.placeholder.com/600x400'}" alt="${project.title}">
                            ${collabTag}
                        </div>
                        <div class="project-content">
                            <h3 class="project-title">${project.title}</h3>
                            <p class="project-description">${project.description}</p>
                            ${roleHtml}
                            <div class="project-tech">${techTags}</div>
                            <div class="project-links">
                                <a href="${project.demo_url || '#'}" class="project-link btn-demo" target="_blank">Live Demo</a>
                                <a href="${project.repo_url || '#'}" class="project-link btn-code" target="_blank">View Code</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                const filterValue = button.getAttribute('data-filter');
                if (filterValue === 'all') {
                    renderProjects(allProjects);
                } else {
                    const filtered = allProjects.filter(p => p.category === filterValue);
                    renderProjects(filtered);
                }
            });
        });

        init();
    </script>
</body>
</html>
